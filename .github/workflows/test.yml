name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - 'LICENSE'

permissions:
  contents: read

jobs:
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # ── Linux prerequisites ──
      - name: Install prerequisites (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq gawk

      # ── macOS prerequisites ──
      - name: Cache Homebrew downloads
        if: runner.os == 'macOS'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-${{ hashFiles('.github/workflows/test.yml') }}
          restore-keys: brew-${{ runner.os }}-

      - name: Install prerequisites (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash gnu-sed gawk jq

      # ── Tests ──
      - name: Run unit tests
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            "$(brew --prefix)/bin/bash" tests/run-unit-tests.sh
          else
            bash tests/run-unit-tests.sh
          fi

      # ── macOS-specific: Bash 3.2 re-exec test ──
      - name: Verify Bash 3.2 re-exec to Bash 4+
        if: runner.os == 'macOS'
        run: |
          # Run setup.sh with system Bash 3.2 — it should re-exec to brew Bash 4+
          /bin/bash setup.sh --non-interactive --dry-run 2>&1 | tee /tmp/reexec-output.txt
          # Verify it didn't fail with "Bash 4+ is required"
          if grep -q "Bash 4+ is required" /tmp/reexec-output.txt; then
            echo "FAIL: Bash 4+ re-exec did not trigger"
            exit 1
          fi
          echo "PASS: Bash 3.2 re-exec works correctly"

      # ── macOS-specific: mdm/*.sh must stay Bash 3.2 compatible ──
      # (MDM silent-install runs under macOS system /bin/bash, which stays at 3.2)
      # 構文検査に加え、mdm ユニットテスト一式を 3.2 で実行して parser・
      # 終了コード経路を検証する（Medium 対応: 構文のみでは不足）。
      # NOTE: tests/helpers.sh のカウンタはサブシェル内の pass/fail を親に
      # 集計しない既知の制約があるため、出力の FAIL 行を直接ゲートにする。
      - name: Verify mdm/*.sh under Bash 3.2 (syntax + unit tests)
        if: runner.os == 'macOS'
        run: |
          /bin/bash --version
          for f in mdm/*.sh; do
            echo "Checking $f"
            /bin/bash -n "$f"
          done
          out="$(/bin/bash -c 'source tests/helpers.sh && for f in tests/unit/test-mdm-*.sh; do source "$f"; done' 2>&1)" || {
            echo "$out"
            echo "FAIL: mdm unit tests aborted under Bash 3.2"
            exit 1
          }
          echo "$out"
          if echo "$out" | grep -q 'FAIL'; then
            echo "FAIL: mdm unit tests failed under Bash 3.2"
            exit 1
          fi
          pass_count="$(echo "$out" | grep -c 'PASS' || true)"
          if [ "$pass_count" -lt 50 ]; then
            echo "FAIL: suspiciously few assertions ran under Bash 3.2 (${pass_count})"
            exit 1
          fi
          echo "PASS: mdm/*.sh Bash 3.2 syntax + ${pass_count} unit assertions OK"

  scenario-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        scenario-group: [core, update, update-merge, features]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # ── Linux prerequisites ──
      - name: Install prerequisites (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq gawk

      # ── macOS prerequisites ──
      - name: Cache Homebrew downloads
        if: runner.os == 'macOS'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-${{ hashFiles('.github/workflows/test.yml') }}
          restore-keys: brew-${{ runner.os }}-

      - name: Install prerequisites (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash gnu-sed gawk jq

      # ── Tests ──
      - name: Run scenario tests
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            SCENARIO_GROUP="${{ matrix.scenario-group }}" "$(brew --prefix)/bin/bash" tests/run-scenarios.sh
          else
            SCENARIO_GROUP="${{ matrix.scenario-group }}" bash tests/run-scenarios.sh
          fi
