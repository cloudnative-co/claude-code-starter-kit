name: skill-web-content-extraction

# Node test matrix for the heavy web-content-extraction skill (defuddle/jsdom/
# pdfjs-dist/undici). Runs only when the skill (or this workflow) changes.

on:
  push:
    branches: [main]
    paths:
      - "skills/web-content-extraction/**"
      - ".github/workflows/skill-web-content-extraction.yml"
  pull_request:
    paths:
      - "skills/web-content-extraction/**"
      - ".github/workflows/skill-web-content-extraction.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: skills/web-content-extraction

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # undici@8 requires Node >=22.19 and pdfjs-dist@6 requires >=22.13, so
        # Node 20 is intentionally excluded (it would only give false assurance).
        node-version: [22.x, 24.x]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: skills/web-content-extraction/package-lock.json
      - name: Install dependencies (from lockfile)
        run: npm ci --ignore-scripts
      - name: Syntax check scripts
        run: |
          for f in scripts/*.mjs scripts/lib/*.mjs; do node --check "$f"; done
      - name: Run tests
        run: npm test
